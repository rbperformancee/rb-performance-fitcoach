  <body>
    <div id="splash">
      <div class="splash-icon">
        <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <polygon points="300,60 180,280 248,280 210,450 340,220 268,220 300,60"/>
        </svg>
      </div>
      <div class="splash-text">RB PERFORM</div>
      <div class="splash-bar"></div>
    </div>
    <div id="root"></div>
    <script>
      (function(){
        var splash = document.getElementById('splash');
        if (!splash) return;

        // Disparition apres 1.0s (eclair dessine, plus de freeze artificiel).
        // Sur /demo et /demo-client, la transition est invisible (meme bg) car
        // le splash React prend immediatement le relais avec progress messaging.
        setTimeout(function(){
          splash.classList.add('fade-out');
          setTimeout(function(){
            if (splash.parentNode) splash.parentNode.removeChild(splash);
          }, 700);
        }, 1000);
      })();
      // ===== Service Worker registration =====
      // Sans ca : pas de cache offline, pas de push notifications, pas de PWA fullsize.
      // Skip en localhost pour eviter le cache aggressif qui masque les changements
      // de chunks lazy (Onboarding, etc.) pendant le dev.
      var isLocalDev = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
      if ('serviceWorker' in navigator && !isLocalDev) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js').catch(function(err) {
            console.warn('[SW] registration failed:', err);
          });
        });
      } else if (isLocalDev && 'serviceWorker' in navigator) {
        // Auto-unregister tout SW existant en local pour purger le cache
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          regs.forEach(function(r) { r.unregister(); });
        });
      }
    </script>
    <!-- ===== Cookie consent (GDPR + ePrivacy) — non-blocking, defer.
         Loaded from /index.html so it's available across the React app too;
         React components call window.RBConsent.show() to reopen the banner. ===== -->
    <script src="/cookie-consent.js" defer></script>
