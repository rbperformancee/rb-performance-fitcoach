# Supabase project config (Edge Functions only)
# Voir docs : https://supabase.com/docs/guides/functions/auth

# send-push : on désactive le verify_jwt natif parce que les nouveaux opaque
# tokens (sb_publishable_*, sb_secret_*) ne sont pas des JWT et le runtime
# Supabase les rejette. L'auth est faite à l'intérieur de la function via
# vérification stricte du header apikey/Authorization (= ANON ou SR).
[functions.send-push]
verify_jwt = false

# daily-reminder : appelée par pg_cron via pg_net (header apikey). Même
# raison que send-push — auth vérifiée dans la function.
[functions.daily-reminder]
verify_jwt = false

# ===== AUTH — Configuration RB Perform =====
# Push avec : npx supabase config push --project-ref pwkajyrpldhlybavmopd --yes
# Les templates HTML sont dans supabase/email-templates/

# IMPORTANT : on déclare ici les valeurs ACTUELLES du dashboard pour éviter
# que `config push` ne les écrase avec ses défauts CLI (qui sont plus restrictifs).
[auth.email]
max_frequency = "1m0s"
otp_length = 6
otp_expiry = 86400          # 24h (choix produit pour réduire friction onboarding coach)
enable_confirmations = false
secure_password_change = false

[auth.email.template.recovery]
subject = "Définis ton mot de passe — RB Perform"
content_path = "./supabase/email-templates/reset-password.html"
