<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<script>
async function generate() {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111111"/>
      <stop offset="100%" style="stop-color:#0d0d0d"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Fond arrondi -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <!-- Bordure subtile -->
  <rect width="512" height="512" rx="110" fill="none" stroke="rgba(2,209,186,0.3)" stroke-width="8"/>
  <!-- Éclair principal -->
  <polygon points="300,60 180,280 248,280 210,450 340,220 268,220 300,60" 
           fill="#02d1ba" filter="url(#glow)"/>
  <!-- RB text -->
  <text x="90" y="460" font-family="Arial Black, Arial" font-weight="900" 
        font-size="64" fill="white" letter-spacing="-2">RB</text>
  <!-- PERFORM text -->
  <text x="90" y="510" font-family="Arial Black, Arial" font-weight="900" 
        font-size="36" fill="#02d1ba" letter-spacing="2">PERFORM</text>
</svg>`;
  const blob = new Blob([svg], {type: 'image/svg+xml'});
  const url = URL.createObjectURL(blob);
  const img = new Image();
  img.onload = () => {
    [192, 512].forEach(size => {
      const canvas = document.createElement('canvas');
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, size, size);
      const a = document.createElement('a');
      a.href = canvas.toDataURL('image/png');
      a.download = `icon-${size}.png`;
      a.click();
    });
  };
  img.src = url;
}
generate();
</script>
</body>
</html>
