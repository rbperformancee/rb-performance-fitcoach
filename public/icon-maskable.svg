<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111111"/>
      <stop offset="100%" style="stop-color:#0d0d0d"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Fond plein (le maskable est decoupe par l'OS) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Eclair centre dans la safe zone (40% radius = 102px-410px) -->
  <g transform="translate(256, 256) scale(0.7) translate(-256, -256)">
    <polygon points="300,60 180,280 248,280 210,450 340,220 268,220 300,60"
             fill="#02d1ba" filter="url(#glow)"/>
  </g>
</svg>
