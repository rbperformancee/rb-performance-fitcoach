<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#0a0a0a" stop-opacity="1"/>
      <stop offset="60%" stop-color="#030303" stop-opacity="1"/>
      <stop offset="100%" stop-color="#030303" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="orangeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fond avec glow radial subtil -->
  <rect width="1200" height="630" fill="url(#bgGlow)"/>

  <!-- Halo orange derriere le logo -->
  <circle cx="600" cy="220" r="180" fill="url(#orangeGlow)"/>

  <!-- Grille subtile en overlay (bande gauche) -->
  <g stroke="rgba(255,255,255,0.04)" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="530" x2="1200" y2="530"/>
  </g>

  <!-- Logo : cercle avec monogramme "RB" -->
  <g transform="translate(600, 220)" filter="url(#softShadow)">
    <circle r="68" fill="url(#logoGrad)"/>
    <circle r="68" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
    <text
      x="0" y="0"
      text-anchor="middle"
      dominant-baseline="central"
      font-family="-apple-system, SF Pro Display, Inter, system-ui, sans-serif"
      font-weight="900"
      font-size="44"
      letter-spacing="-1"
      fill="#0a0a0a"
    >RB</text>
  </g>

  <!-- Wordmark : "RB PERFORM" -->
  <text
    x="600" y="380"
    text-anchor="middle"
    font-family="-apple-system, SF Pro Display, Inter, system-ui, sans-serif"
    font-weight="900"
    font-size="82"
    letter-spacing="-3"
    fill="#ffffff"
  >RB PERFORM</text>

  <!-- Separateur orange -->
  <line x1="540" y1="410" x2="660" y2="410" stroke="#f97316" stroke-width="3" stroke-linecap="round"/>

  <!-- Tagline -->
  <text
    x="600" y="475"
    text-anchor="middle"
    font-family="-apple-system, SF Pro Display, Inter, system-ui, sans-serif"
    font-weight="500"
    font-size="30"
    letter-spacing="-0.5"
    fill="#ffffff"
  >La performance sans compromis<tspan fill="#f97316">.</tspan></text>

  <!-- Footer microcopy -->
  <g transform="translate(600, 565)">
    <text
      x="0" y="0"
      text-anchor="middle"
      font-family="-apple-system, SF Mono, Menlo, monospace"
      font-weight="600"
      font-size="13"
      letter-spacing="4"
      fill="#8a8a8a"
    >COACHING PREMIUM · SUIVI PERSONNALISE · PWA</text>
  </g>

  <!-- Petit accent teal en haut a gauche (signature) -->
  <g transform="translate(60, 60)">
    <circle r="4" fill="#02d1ba"/>
    <text
      x="14" y="0"
      dominant-baseline="central"
      font-family="-apple-system, SF Mono, Menlo, monospace"
      font-weight="700"
      font-size="12"
      letter-spacing="3"
      fill="#8a8a8a"
    >RB.PERFORM</text>
  </g>
</svg>