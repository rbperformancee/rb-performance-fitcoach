<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#080808" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>RB Performance</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-title" content="RB Performance" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      * { -webkit-tap-highlight-color: transparent; }
      body { background: #080808; overscroll-behavior: none; }
      ::-webkit-scrollbar { width: 0; background: transparent; }
    </style>
  
  
  <div id="root"></div>
      <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  
  
  
  <style>
    body { background: #0d0d0d; margin: 0; }
    #sp {
      position: fixed; inset: 0; z-index: 99999;
      background: #0d0d0d;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: opacity 0.5s ease;
    }
    #sp img {
      width: 130px; height: 130px;
      border-radius: 28px;
      object-fit: cover;
      object-position: center 60%;
      box-shadow: 0 0 50px rgba(2,209,186,0.35);
      border: 1px solid rgba(2,209,186,0.2);
    }
    #sp-label {
      margin-top: 18px; font-size: 11px; font-weight: 700;
      letter-spacing: 4px; color: rgba(2,209,186,0.8);
      font-family: Arial, sans-serif;
    }
  </style>
  <div id="sp">
    <img src="/logo.png" alt="RB PERFORM" />
    <div id="sp-label">RB PERFORM</div>
  </div>
  <script>
    setTimeout(function(){
      var s=document.getElementById('sp');
      if(s){s.style.opacity='0';setTimeout(function(){if(s.parentNode)s.parentNode.removeChild(s)},500)}
    },1500);
  </script>
</body>
</html>
