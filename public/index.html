    <div id="root"></div>
    <script>
      (function(){
        var s = document.getElementById('sp');
        var logo = document.getElementById('sp-logo');
        if (!s || !logo) return;
        requestAnimationFrame(function(){
          setTimeout(function(){ logo.classList.add('in'); }, 80);
        });
        setTimeout(function(){
          s.style.opacity = '0';
          setTimeout(function(){ if (s.parentNode) s.parentNode.removeChild(s); }, 400);
        }, 1400);
      })();
      // ===== Service Worker registration =====
      // Sans ca : pas de cache offline, pas de push notifications, pas de PWA fullsize.
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js').catch(function(err) {
            console.warn('[SW] registration failed:', err);
          });
        });
      }
    </script>
