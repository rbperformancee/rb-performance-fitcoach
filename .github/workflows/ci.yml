name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build + static checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install
        run: npm ci --no-audit --prefer-offline

      - name: npm audit — fail on critical CVEs, warn on high
        run: |
          # CRITICAL in any prod dep fails the build.
          # HIGH is logged for awareness but doesn't block — the current
          # 15 "high" are all react-scripts transitive build-tools (svgo,
          # workbox-build, serialize-javascript, …) with no runtime
          # exposure. Replacing react-scripts with Vite clears them; until
          # then, don't let noise block merges.
          set +e
          npm audit --omit=dev --audit-level=high 2>&1 | tail -20
          set -e
          npm audit --omit=dev --audit-level=critical

      - name: Syntax check all /api/*.js
        run: |
          set -e
          for f in api/*.js api/cron/*.js; do
            [ -f "$f" ] && node --check "$f" && echo "  ✓ $f"
          done

      - name: Validate vercel.json
        run: node -e "JSON.parse(require('fs').readFileSync('vercel.json'))"

      - name: Validate sitemap.xml well-formed
        run: |
          node -e "const x=require('fs').readFileSync('public/sitemap.xml','utf8'); if(!/^<\?xml/.test(x))throw new Error('not xml')"

      - name: Validate security.txt (RFC 9116) present + Expires not lapsed
        run: |
          test -f public/.well-known/security.txt
          grep -q "^Contact:" public/.well-known/security.txt
          EXP=$(grep -oE "^Expires: [0-9TZ:.\-]+" public/.well-known/security.txt | cut -d' ' -f2)
          node -e "const d=new Date('$EXP'); if(d<new Date())process.exit(1)" \
            || (echo "::error::security.txt Expires has lapsed — bump it" && exit 1)

      - name: Build (CRA)
        env:
          CI: "true"
        run: npm run build

      - name: Bundle budget — main.js gzipped < 250 KB
        run: |
          set -e
          MAIN=$(ls build/static/js/main.*.js | head -1)
          SIZE=$(gzip -9 -c "$MAIN" | wc -c)
          KB=$((SIZE / 1024))
          echo "main.js gzipped: ${KB} KB"
          if [ "$KB" -ge 250 ]; then
            echo "::error::main.js is ${KB} KB gzipped — budget is 250 KB"
            exit 1
          fi

      - name: JSON-LD valid on landing
        run: |
          node -e "
            const html = require('fs').readFileSync('public/landing.html','utf8');
            const m = html.match(/<script type=\"application\\/ld\\+json\">\s*(\{[\s\S]+?\})\s*<\/script>/);
            if (!m) throw new Error('no JSON-LD on landing');
            JSON.parse(m[1]);
          "

      - name: No dangerouslySetInnerHTML in src/
        run: |
          if grep -rn "dangerouslySetInnerHTML" src/; then
            echo "::error::dangerouslySetInnerHTML is forbidden in src/"
            exit 1
          fi

      - name: No eval or new Function in src/ or api/
        run: |
          if grep -rnE "\beval\(|\bnew Function\(" src/ api/ 2>/dev/null; then
            echo "::error::eval/new Function forbidden"
            exit 1
          fi

  landing-audit:
    name: Landing audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
      - run: node scripts/landing-audit.js

  smoke-prod:
    name: Post-deploy smoke (prod)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Only on push to main — PRs don't touch prod yet
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      - name: Wait for Vercel deployment to promote
        run: sleep 90

      - name: Run post-deploy smoke against rbperform.app
        run: node scripts/check-deploy.js

      - name: Fail job summary on red
        if: failure()
        run: |
          echo "❌ Post-deploy smoke failed — see step above for the failing check."
          echo "Likely causes: Vercel build error, env var drift, third-party outage."
          echo "See docs/RUNBOOK.md for scenario-by-scenario triage."
