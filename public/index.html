    <style>
      * { -webkit-tap-highlight-color: transparent; }
      /* Fix iOS Safari 100vh bug : 100vh inclut la barre URL sur iOS.
         -webkit-fill-available est le fix canonique Apple.
         100dvh est le fix moderne (iOS 15.4+). */
      html { height: 100%; height: -webkit-fill-available; }
      body { background: #0d0d0d; overscroll-behavior: none; min-height: 100%; min-height: -webkit-fill-available; min-height: 100dvh; }

      #splash {
        position: fixed; inset: 0;
        background: #000;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 14px;
        z-index: 99999;
        transition: opacity .2s ease;
      }
      #splash.fade-out { opacity: 0; pointer-events: none; }
      #splash-logo {
        display: flex; align-items: center; gap: 10px;
        opacity: 0;
        transform: scale(.92) translateY(6px);
        transition: opacity .5s cubic-bezier(.22,1,.36,1), transform .5s cubic-bezier(.22,1,.36,1);
      }
      #splash-logo.visible { opacity: 1; transform: scale(1) translateY(0); }

        font-size: 10px; font-weight: 400;
        letter-spacing: .3em;
        color: rgba(255,255,255,.2);
        text-transform: uppercase;
        opacity: 0;
        transition: opacity .4s ease .3s;
      }
      #splash-tagline.visible { opacity: 1; }

    <div id="splash">
      <div id="splash-logo">
        <svg
          viewBox="170 50 180 410"
          width="18"
          height="40"
          xmlns="http://www.w3.org/2000/svg"
          aria-hidden="true"
        >
          <polygon
            points="300,60 180,280 248,280 210,450 340,220 268,220 300,60"
            fill="#02d1ba"
          />
        </svg>
        <div id="splash-wordmark">RB<span>PERFORM</span></div>
      </div>
      <div id="splash-tagline">La performance sans compromis</div>
    </div>
    <div id="root"></div>
    <script>
      (function(){
        var splash = document.getElementById('splash');
        var logo = document.getElementById('splash-logo');
        var tagline = document.getElementById('splash-tagline');
        if (!splash) return;

        // Apparition instantanee
        requestAnimationFrame(function(){
          logo.classList.add('visible');
          tagline.classList.add('visible');
        });

        // Disparition rapide (400ms)
        setTimeout(function(){
          splash.classList.add('fade-out');
          setTimeout(function(){
            if (splash.parentNode) splash.parentNode.removeChild(splash);
          }, 200);
        }, 400);
      })();
      // ===== Service Worker registration =====
      // Sans ca : pas de cache offline, pas de push notifications, pas de PWA fullsize.
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js').catch(function(err) {
            console.warn('[SW] registration failed:', err);
          });
        });
      }
    </script>
